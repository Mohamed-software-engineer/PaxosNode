version: '3.8'

services:
  node1:
    build: .
    container_name: node1
    environment:
      - NODE_ID=1
      - STARTUP_DELAY=1
      - PEERS=http://node1:8080,http://node2:8080,http://node3:8080,http://node4:8080,http://node5:8080
    ports:
      - "5001:8080"

  node2:
    build: .
    container_name: node2
    environment:
      - NODE_ID=2
      - STARTUP_DELAY=5
      - PEERS=http://node1:8080,http://node2:8080,http://node3:8080,http://node4:8080,http://node5:8080
    ports:
      - "5002:8080"

  node3:
    build: .
    container_name: node3
    environment:
      - NODE_ID=3
      - STARTUP_DELAY=2
      - PEERS=http://node1:8080,http://node2:8080,http://node3:8080,http://node4:8080,http://node5:8080
    ports:
      - "5003:8080"

  node4:
    build: .
    container_name: node4
    environment:
      - NODE_ID=4
      - STARTUP_DELAY=7
      - PEERS=http://node1:8080,http://node2:8080,http://node3:8080,http://node4:8080,http://node5:8080
    ports:
      - "5004:8080"

  node5:
    build: .
    container_name: node5
    environment:
      - NODE_ID=5
      - STARTUP_DELAY=3
      - PEERS=http://node1:8080,http://node2:8080,http://node3:8080,http://node4:8080,http://node5:8080
    ports:
      - "5005:8080"